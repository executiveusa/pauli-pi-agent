name: Deploy YouTube KG Agent

on:
  push:
    branches: [main]
    paths:
      - "packages/youtube-kg-agent/**"
      - ".github/workflows/deploy-youtube-kg.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build youtube-kg-agent
        run: npm run build --workspace=packages/youtube-kg-agent

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --yes
        working-directory: packages/youtube-kg-agent
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
